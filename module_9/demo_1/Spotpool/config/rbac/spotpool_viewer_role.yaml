# This rule is not used by the project spotpool itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to devops.geektime.devopscamp.gk resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: spotpool
    app.kubernetes.io/managed-by: kustomize
  name: spotpool-viewer-role
rules:
- apiGroups:
  - devops.geektime.devopscamp.gk
  resources:
  - spotpools
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - devops.geektime.devopscamp.gk
  resources:
  - spotpools/status
  verbs:
  - get
